name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            kind: linux
            artifact_name: connect-linux-x86_64
            package_name: connect-linux-x86_64.tar.gz
          - os: macos-latest
            kind: macos
            artifact_name: connect-macos-x86_64
            package_name: connect-macos.pkg
          - os: windows-latest
            kind: windows
            artifact_name: connect-windows-x64
            package_name: connect-windows-x64.msi
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Default macOS signing state
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          echo "MACOS_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
          echo "MACOS_NOTARIZATION_ENABLED=false" >> "$GITHUB_ENV"

      - name: Import macOS signing certificates
        if: matrix.kind == 'macos'
        shell: bash
        env:
          MACOS_DEVELOPER_ID_APPLICATION_P12: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12 }}
          MACOS_DEVELOPER_ID_INSTALLER_P12: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_DEVELOPER_ID_APPLICATION_P12:-}" ] || [ -z "${MACOS_DEVELOPER_ID_INSTALLER_P12:-}" ] || [ -z "${MACOS_DEVELOPER_ID_P12_PASSWORD:-}" ] || [ -z "${MACOS_KEYCHAIN_PASSWORD:-}" ]; then
            echo "macOS signing secrets are not configured; building unsigned package"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/connect-signing.keychain-db"
          APP_CERT_PATH="$RUNNER_TEMP/connect-app-cert.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/connect-installer-cert.p12"

          echo "$MACOS_DEVELOPER_ID_APPLICATION_P12" | base64 --decode > "$APP_CERT_PATH"
          echo "$MACOS_DEVELOPER_ID_INSTALLER_P12" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/productsign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'\"' '/Developer ID Application/ {print $2; exit}')"
          INSTALLER_IDENTITY="$(security find-identity -v "$KEYCHAIN_PATH" | awk -F'\"' '/Developer ID Installer/ {print $2; exit}')"

          if [ -z "$APP_IDENTITY" ] || [ -z "$INSTALLER_IDENTITY" ]; then
            echo "Unable to locate imported Developer ID identities" >&2
            exit 1
          fi

          echo "MACOS_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_IDENTITY=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "MACOS_INSTALLER_IDENTITY=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"

      - name: Prepare macOS notarization credentials
        if: matrix.kind == 'macos'
        shell: bash
        env:
          MACOS_NOTARY_API_KEY_P8: ${{ secrets.MACOS_NOTARY_API_KEY_P8 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          if [ -z "${MACOS_NOTARY_API_KEY_P8:-}" ] || [ -z "${MACOS_NOTARY_KEY_ID:-}" ]; then
            echo "macOS notarization secrets are not configured; skipping notarization"
            exit 0
          fi

          NOTARY_KEY_PATH="$RUNNER_TEMP/connect-notary-authkey.p8"
          echo "$MACOS_NOTARY_API_KEY_P8" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          echo "MACOS_NOTARIZATION_ENABLED=true" >> "$GITHUB_ENV"
          echo "MACOS_NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
          echo "MACOS_NOTARY_KEY_ID=$MACOS_NOTARY_KEY_ID" >> "$GITHUB_ENV"
          if [ -n "${MACOS_NOTARY_ISSUER_ID:-}" ]; then
            echo "MACOS_NOTARY_ISSUER_ID=$MACOS_NOTARY_ISSUER_ID" >> "$GITHUB_ENV"
          fi

      - name: Package Linux tarball
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/connect dist/connect
          cp packaging/install.sh dist/install.sh
          tar -C dist -czf dist/${{ matrix.package_name }} connect install.sh

      - name: Package macOS installer
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(next(pkg["version"] for pkg in json.load(sys.stdin)["packages"] if pkg["name"] == "connect"))')"
          fi
          mkdir -p distroot/usr/local/bin dist
          cp target/release/connect distroot/usr/local/bin/connect
          chmod 755 distroot/usr/local/bin/connect
          if [ "${MACOS_SIGNING_ENABLED:-false}" = "true" ]; then
            codesign --force --timestamp --options runtime --sign "$MACOS_CODESIGN_IDENTITY" distroot/usr/local/bin/connect
          fi
          pkgbuild \
            --root distroot \
            --scripts packaging/macos \
            --identifier com.connect.cli \
            --version "$version" \
            --install-location / \
            dist/${{ matrix.package_name }}
          if [ "${MACOS_SIGNING_ENABLED:-false}" = "true" ]; then
            productsign --sign "$MACOS_INSTALLER_IDENTITY" dist/${{ matrix.package_name }} dist/connect-macos-signed.pkg
            mv dist/connect-macos-signed.pkg dist/${{ matrix.package_name }}
          fi
          if [ "${MACOS_NOTARIZATION_ENABLED:-false}" = "true" ]; then
            notary_args=(--key "$MACOS_NOTARY_KEY_PATH" --key-id "$MACOS_NOTARY_KEY_ID")
            if [ -n "${MACOS_NOTARY_ISSUER_ID:-}" ]; then
              notary_args+=(--issuer "$MACOS_NOTARY_ISSUER_ID")
            fi
            xcrun notarytool submit dist/${{ matrix.package_name }} "${notary_args[@]}" --wait
            xcrun stapler staple dist/${{ matrix.package_name }}
            xcrun stapler validate dist/${{ matrix.package_name }}
            spctl -a -vvv -t install dist/${{ matrix.package_name }}
          fi

      - name: Install WiX
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix
          $env:PATH = "$env:PATH;$env:USERPROFILE\.dotnet\tools"

      - name: Package Windows installer
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
            $version = ($metadata.packages | Where-Object { $_.name -eq 'connect' } | Select-Object -First 1).version
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\connect.exe dist\connect.exe
          $env:PATH = "$env:PATH;$env:USERPROFILE\.dotnet\tools"
          wix build packaging\windows\connect.wxs -b "SourceDir=$PWD\dist" -d ProductVersion=$version -o dist\${{ matrix.package_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.package_name }}

      - name: Clean up macOS signing keychain
        if: always() && matrix.kind == 'macos'
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/connect-signing.keychain-db"
          NOTARY_KEY_PATH="$RUNNER_TEMP/connect-notary-authkey.p8"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          if [ -f "$NOTARY_KEY_PATH" ]; then
            rm -f "$NOTARY_KEY_PATH"
          fi
